parameters:
  poolName: ''

jobs:
- job: Documentation
  # Provisioning the mobile workloads on a cold cache does not fit in the 60 minute default.
  timeoutInMinutes: 120
  cancelTimeoutInMinutes: 0
  displayName: 'Build Documentation WebSite'

  pool: ${{ parameters.poolName }}

  variables:
    CombinedConfiguration: Release|Any CPU
    CI_Build: true

    # Use pre-defined local nuget cache for restore
    NUGET_PACKAGES: 'C:\NugetPackages'
    XAML_FLAVOR_BUILD: WinUI

  steps:
  - template: ../templates/nuget-cache.yml
    parameters:
      nugetPackages: $(NUGET_PACKAGES)

  # GenerateDoc restores the sync-gen filter, which includes the netcoremobile heads, so the mobile
  # workloads must be provisioned here just as they are for the managed binaries build.
  - template: ../templates/dotnet-mobile-install-windows.yml
    parameters:
      UnoCheckParameters: '--preview-major --tfm $(netCurrentTargetFramework)-ios --tfm $(netCurrentTargetFramework)-maccatalyst --tfm $(netCurrentTargetFramework)-android --tfm $(netCurrentTargetFramework)-tvos'

  - template: ../templates/gitversion.yml
  - template: ../templates/jdk-setup.yml

  - template: ../templates/docfx-intermediary-assets.yml

  # Built through the .NET SDK's MSBuild rather than the VS one: the SDK requires a newer MSBuild
  # than the VS image carries, and the VS msbuild.exe therefore cannot resolve Microsoft.NET.Sdk.
  - task: DotNetCoreCLI@2
    displayName: Generate Documentation
    inputs:
      command: custom
      custom: msbuild
      workingDirectory: Build
      arguments: Uno.UI.Build.csproj /r /m /t:GenerateDoc /p:CheckExclusions=True "/p:CombinedConfiguration=$(CombinedConfiguration)" /detailedsummary /bl:$(Agent.TempDirectory)/unobinlog/generate-docs.binlog

  - task: PublishPipelineArtifact@1
    displayName: 'Publish Docs Artifacts'
    retryCountOnTaskFailure: 3
    inputs:
      targetPath: $(build.artifactstagingdirectory)
      ArtifactName: docs

  - task: PublishBuildArtifacts@1
    condition: always()
    retryCountOnTaskFailure: 3
    inputs:
      PathtoPublish: $(Agent.TempDirectory)/unobinlog
      ArtifactName: docs-logs
      ArtifactType: Container
