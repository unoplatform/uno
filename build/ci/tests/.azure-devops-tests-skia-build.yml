parameters:
  vmImage: ''
  XAML_FLAVOR_BUILD: ''

jobs:
- job: Skia_Tests_Build
  displayName: 'Build Samples App'
  timeoutInMinutes: 60
  cancelTimeoutInMinutes: 0

  pool:
    vmImage: ${{ parameters.vmImage }}

  variables:
    CombinedConfiguration: Release|Any CPU
    CI_Build: true

    # Use pre-defined local nuget cache for restore
    NUGET_PACKAGES: 'C:\NugetPackages'

    XAML_FLAVOR_BUILD: ${{ parameters.XAML_FLAVOR_BUILD }}


  steps:
  - checkout: self
    clean: true

  - template: ../templates/gitversion.yml
  - template: ../templates/dotnet-mobile-install-windows.yml
    parameters:
      UnoCheckParameters: '--tfm net10.0-desktop'

  - template: ../templates/pack-local-uno-sdk.yml

  - template: ../templates/nuget-cache.yml
    parameters:
      nugetPackages: $(NUGET_PACKAGES)

  ## Restore skia-macos native assets
  - task: DownloadPipelineArtifact@2
    displayName: Restoring macOS native assets
    inputs:
      artifact: native-assets-macos
      path: $(Build.SourcesDirectory)/src/Uno.UI.Runtime.Skia.MacOS/UnoNativeMac/build/Release

  - powershell: dotnet build src/SamplesApp/SamplesApp.Head/SamplesApp.Head.csproj -c Release -p:UnoTargetFrameworkOverride=net10.0-desktop -p:UNO_DISABLE_ANALYZERS_IN_SAMPLES=true -f net10.0-desktop /bl:$(build.artifactstagingdirectory)\logs\build-generic.binlog
    displayName: Build Generic Skia Head

  - task: PublishPipelineArtifact@1
    displayName: 'Publish Generic Binaries'
    retryCountOnTaskFailure: 3
    inputs:
      targetPath: $(Build.SourcesDirectory)\src\SamplesApp\SamplesApp.Head\bin\SamplesApp.Head\Release\net10.0-desktop
      artifactName: samplesapp-desktop-skia

  - task: PublishBuildArtifacts@1
    displayName: 'Publish Desktop Skia build logs'
    retryCountOnTaskFailure: 3
    condition: always()
    inputs:
      PathtoPublish: $(build.artifactstagingdirectory)\logs
      ArtifactName: samplesapp-desktop-skia-logs
      ArtifactType: Container
