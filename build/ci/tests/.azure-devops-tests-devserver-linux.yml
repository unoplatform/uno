parameters:
  poolName: ''

jobs:
- job: DevServer_Tests_Linux
  displayName: 'Run DevServer Tests (Linux)'
  timeoutInMinutes: 30
  cancelTimeoutInMinutes: 0

  pool: ${{ parameters.poolName }}

  variables:
    CombinedConfiguration: Release|Any CPU
    CI_Build: true

  steps:
  - checkout: self
    clean: true

  - template: ../templates/gitversion.yml
  - template: ../templates/dotnet-install.yml

  # Required to build fixtures targeting net8.0 / net9.0 (used by DevServer integration tests).
  - task: UseDotNet@2
    displayName: Install .NET 9 SDK
    inputs:
      packageType: 'sdk'
      version: '9.0.300'
      installationPath: $(DOTNET_INSTALL_DIR)

  - task: UseDotNet@2
    displayName: Install .NET 8 SDK
    inputs:
      packageType: 'sdk'
      version: '8.0.x'
      installationPath: $(DOTNET_INSTALL_DIR)

  # This stage runs two complementary checks:
  #
  #   1. Uno.Sdk.AddInVersionValidation.Tests — the regression gate that fails whenever the
  #      add-in packages declared in src/Uno.Sdk/packages.json have misaligned AssemblyRef
  #      versions. RED here means add-in maintainers need to align their dependencies before
  #      this PR can merge.
  #
  #   2. Uno.UI.RemoteControl.DevServer.Tests — the host-side integration tests that verify
  #      add-in loading and cross-add-in type sharing. GREEN here means the host correctly
  #      handles whatever the SDK ships.
  #
  # Kept isolated from the heavier Windows unit-tests stage so PR authors see add-in
  # resolution regressions immediately, on Linux (the cheapest agent class).
  - pwsh: |
      dotnet build src/Uno.Sdk.AddInVersionValidation.Tests/Uno.Sdk.AddInVersionValidation.Tests.csproj `
        -c Release `
        -p:UnoTargetFrameworkOverride=net10.0 `
        -p:UNO_DISABLE_ANALYZERS_IN_SAMPLES=true `
        -bl:$(build.artifactstagingdirectory)/addin-validation-build.binlog
    displayName: Build add-in version validation

  - pwsh: |
      dotnet test --project src/Uno.Sdk.AddInVersionValidation.Tests/Uno.Sdk.AddInVersionValidation.Tests.csproj `
        -c Release `
        -p:UnoTargetFrameworkOverride=net10.0 `
        -p:UNO_DISABLE_ANALYZERS_IN_SAMPLES=true `
        --no-build `
        --no-progress `
        --report-trx `
        --results-directory $(Build.SourcesDirectory)/artifacts/TestResults
    displayName: Run add-in version validation (regression gate — RED until packages.json add-ins align their dependencies)

  - pwsh: |
      dotnet build src/Uno.UI.RemoteControl.DevServer.Tests/Uno.UI.RemoteControl.DevServer.Tests.csproj `
        -c Release `
        -p:UnoTargetFrameworkOverride=net10.0 `
        -p:UNO_DISABLE_ANALYZERS_IN_SAMPLES=true `
        -bl:$(build.artifactstagingdirectory)/devserver-tests-build.binlog
    displayName: Build DevServer tests + fixtures

  - pwsh: |
      dotnet test --project src/Uno.UI.RemoteControl.DevServer.Tests/Uno.UI.RemoteControl.DevServer.Tests.csproj `
        -c Release `
        -p:UnoTargetFrameworkOverride=net10.0 `
        -p:UNO_DISABLE_ANALYZERS_IN_SAMPLES=true `
        --no-build `
        --no-progress `
        --report-trx `
        --results-directory $(Build.SourcesDirectory)/artifacts/TestResults
    displayName: Run DevServer tests

  - task: PublishTestResults@2
    displayName: Publish TRX Test Results
    inputs:
      testResultsFormat: 'VSTest'
      testResultsFiles: '*.trx'
      searchFolder: '$(Build.SourcesDirectory)/artifacts/TestResults'
      testRunTitle: 'DevServer Tests (Linux)'
      mergeTestResults: true
    continueOnError: true
    condition: always()

  - task: PublishBuildArtifacts@1
    retryCountOnTaskFailure: 3
    condition: always()
    inputs:
      PathtoPublish: $(build.artifactstagingdirectory)
      ArtifactName: devserver-tests-linux-logs
      ArtifactType: Container
