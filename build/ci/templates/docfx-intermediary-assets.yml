steps:
  - task: UseNode@1
    displayName: "Install Node 14.17.1"
    inputs:
      version: "14.17.1"

  - bash: |
      cd "$(Build.SourcesDirectory)/doc/"
      npm install
    displayName: Install Dependencies

  - bash: |
      cd "$(Build.SourcesDirectory)/doc/"
      npm run build
    displayName: Build intermediary assets
