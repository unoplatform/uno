# https://github.com/actions/labeler

area/automation:
  - changed-files:
    - any-glob-to-any-file:
      - src/SamplesApp/*
      - src/SamplesApp/**/*
      - src/Uno.UI.UnitTests/*
      - src/Uno.UI.UnitTests/**/*
      - src/Uno.UI.Wasm.Tests/*
      - src/Uno.UI.Wasm.Tests/**/*

area/build:
  - changed-files:
    - any-glob-to-any-file:
      - build/*
      - build/**/*
      - '**/*.yml'
      - src/Uno.UI.TestComparer/*
      - src/Uno.UI.TestComparer/**/*

area/code-generation:
  - changed-files:
    - any-glob-to-any-file:
      - src/SourceGenerators/*
      - src/SourceGenerators/**/*

kind/documentation:
  - changed-files:
    - any-glob-to-any-file:
      - README.*
      - doc/**
      - '**/*.md'
      - '**/*.MD'
      - '**/*.txt'

area/skia ✏️:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.skia.cs'
      - src/Uno.UI.Runtime.Skia.Linux.FrameBuffer/*
      - src/Uno.UI.Runtime.Skia.Linux.FrameBuffer/**/*
      - src/Uno.UI.Runtime.Skia.Tizen/*
      - src/Uno.UI.Runtime.Skia.Tizen/**/*
      - src/Uno.UI.Runtime.Skia.Android/*
      - src/Uno.UI.Runtime.Skia.Android/**/*
      - src/Uno.UI.Runtime.Skia.AppleUIKit/*
      - src/Uno.UI.Runtime.Skia.AppleUIKit/**/*

area/solution-templates:
  - changed-files:
    - any-glob-to-any-file:
      - src/SolutionTemplate/*
      - src/SolutionTemplate/**/*
      - src/UnoItemTemplate/*
      - src/UnoItemTemplate/**/*

area/sdk:
  - changed-files:
    - any-glob-to-any-file:
      - src/Uno.Sdk/*

platform/android 🤖:
  - changed-files:
    - any-glob-to-any-file:
      - src/Uno.UI.BindingHelper.Android/*
      - src/Uno.UI.BindingHelper.Android/**/*
      - '**/*.Android.cs'
      - '**/*.Xamarin.cs'
      - src/Uno.UI.Runtime.Skia.Android/*
      - src/Uno.UI.Runtime.Skia.Android/**/*

platform/wasm 🌐:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.wasm.cs'
      - src/Uno.UI.Wasm/*
      - src/Uno.UI.Wasm/**/*
      - src/Uno.Foundation.Runtime.WebAssembly/*
      - src/Uno.Foundation.Runtime.WebAssembly/**/*
      - src/Uno.UI.Runtime.WebAssembly/*
      - src/Uno.UI.Runtime.WebAssembly/**/*
      - src/Uno.UI.Runtime.Skia.WebAssembly.Browser/*
      - src/Uno.UI.Runtime.Skia.WebAssembly.Browser/**/*

platform/ios 🍎:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.iOS.cs'
      - '**/*.UIKit.cs'
      - '**/*.iOSmacOS.cs'
      - '**/*.Apple.cs'
      - '**/*.Xamarin.cs'
      - src/Uno.UI.Runtime.Skia.AppleUIKit/*
      - src/Uno.UI.Runtime.Skia.AppleUIKit/**/*

platform/macos 🍏:
  - changed-files:
    - any-glob-to-any-file:
      - src/Uno.UI.Runtime.Skia.MacOS/*
      - src/Uno.UI.Runtime.Skia.MacOS/**/*

platform/x11 🐧:
  - changed-files:
    - any-glob-to-any-file:
      - src/Uno.UI.Runtime.Skia.X11/*
      - src/Uno.UI.Runtime.Skia.X11/**/*
