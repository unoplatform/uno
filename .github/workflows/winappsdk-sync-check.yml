name: WinAppSDK Sync Generator Check

on:
  pull_request:
    paths:
      - 'src/Uno.WinAppSDKSyncGenerator/**'
      - 'src/Uno.WinAppSDKSyncGenerator.References/**'
      - 'src/Uno.UI.SourceGenerators.Internal/**'
      - 'src/**/Generated/**'
      - 'build/run-api-sync-tool.cmd'
      - 'build/filters/Uno.UI-top-projects-for-sync-gen.slnf'
      - 'build/Uno.UI.Build.csproj'
      - '.github/workflows/winappsdk-sync-check.yml'
  workflow_dispatch:

jobs:
  sync-check:
    if: github.repository == 'unoplatform/uno'
    name: WinAppSDK Sync Generator Check
    runs-on: windows-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Pin .NET Version
        shell: bash
        run: cp build/ci/net10/_global.json global.json

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install required .NET workloads
        shell: bash
        run: dotnet workload install android ios maccatalyst tvos

      - name: Restore sync generator solution filter
        working-directory: build
        shell: bash
        run: >
          dotnet restore filters/Uno.UI-top-projects-for-sync-gen.slnf
          -p:Configuration=Release
          -p:CI_Build=true
          -p:_IsCIBuild=true
          -p:SyncGeneratorRunning=true

      - name: Build WinAppSDKSyncGenerator
        shell: bash
        run: dotnet build src/Uno.WinAppSDKSyncGenerator/Uno.WinAppSDKSyncGenerator.csproj -c Release

      - name: Build WinAppSDKSyncGenerator.References
        shell: bash
        run: dotnet build src/Uno.WinAppSDKSyncGenerator.References/Uno.WinAppSDKSyncGenerator.References.csproj -c Release

      - name: Run WinAppSDKSyncGenerator (sync)
        shell: bash
        run: src/Uno.WinAppSDKSyncGenerator/bin/Release/net10.0/Uno.WinAppSDKSyncGenerator.exe sync

      - name: Restore pinned global.json
        shell: bash
        run: git checkout -- global.json

      - name: Detect drift
        id: drift
        shell: bash
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "No drift detected."
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Sync generator drift detected."
            git add -A
            git diff --cached > sync-generator.patch
            echo "---- git status ----"
            git status
            echo "---- git diff (truncated to 400 lines) ----"
            git -c color.ui=always diff --cached | head -n 400
          fi

      - name: Upload patch artifact
        if: steps.drift.outputs.drift == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sync-generator-patch
          path: sync-generator.patch
          if-no-files-found: error

      - name: Post drift comment
        if: steps.drift.outputs.drift == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const shortSha = process.env.HEAD_SHA.slice(0, 7);
            const body = [
              `### WinAppSDK sync generator drift detected on \`${shortSha}\``,
              '',
              'The `Uno.WinAppSDKSyncGenerator` produced changes that are not committed on this PR.',
              '',
              '**To apply automatically** (PRs from branches in this repo only): comment `/apply-sync-gen` on this PR and a bot will push `chore: Sync generator run` to the head branch.',
              '',
              '**To apply manually** (required for PRs from forks):',
              `1. Download the \`sync-generator-patch\` artifact from [this run](${process.env.RUN_URL}).`,
              '2. In your local checkout of the PR branch:',
              '   ```',
              '   git apply sync-generator.patch',
              '   git commit -am "chore: Sync generator run"',
              '   git push',
              '   ```',
              '',
              'Or re-run the generator locally on Windows via `build\\run-api-sync-tool.cmd`.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if drift detected
        if: steps.drift.outputs.drift == 'true'
        shell: bash
        run: exit 1
