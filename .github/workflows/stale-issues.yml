name: 'Close Stale Issues'
on:
  schedule:
    - cron: '0 0 * * *' #run daily at midnight

  workflow_dispatch:

permissions:
  issues: write
  
jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # docs: https://github.com/actions/stale?tab=readme-ov-file

          stale-issue-message: 'This issue has had no activity for 120 days. It will be closed in 10 days if there is no further activity. Remove the Stale label or leave a comment to keep it open.'
          close-issue-message: 'This issue was closed because it had no activity for 10 days after being marked as stale. If you believe this is still relevant, feel free to reopen it or open a new issue with updated context.'

          stale-issue-label: 'Stale'
          remove-issue-stale-when-updated: true

          days-before-issue-stale: 120
          days-before-issue-close: 10

          operations-per-run: 200

          exempt-issue-labels: 'pinned,keep-open'

          # Flag older Issues first
          ascending: true

          debug-only: false
